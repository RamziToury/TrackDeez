<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="55%" stop-color="#a47dff"/>
      <stop offset="100%" stop-color="#06d2e0"/>
    </linearGradient>
  </defs>
  <!-- iOS rounds the icon automatically; we fill the full square with the gradient -->
  <rect width="180" height="180" fill="url(#bg)"/>
  <!-- Hexagon outline subtle -->
  <path d="M90 28 L150 60 L150 120 L90 152 L30 120 L30 60 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Tracking bars -->
  <rect x="50" y="68"  width="68" height="12" rx="6" fill="white"/>
  <rect x="50" y="86"  width="48" height="12" rx="6" fill="white"/>
  <rect x="50" y="104" width="74" height="12" rx="6" fill="white"/>
  <!-- Gold accent dot -->
  <circle cx="112" cy="92" r="7" fill="#f6c90e"/>
</svg>
